<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>しりとり</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>しりとり</h1>
    <button id="mute-btn" class="mute-btn" type="button" aria-label="効果音の切り替え"></button>
  </header>

  <!-- モード切替タブ -->
  <nav class="tabs">
    <button class="tab active" data-mode="cpu">CPUと対戦</button>
    <button class="tab" data-mode="multi">オンライン対戦</button>
  </nav>

  <main>
    <!-- CPU対戦 -->
    <section id="cpu" class="panel">
      <p id="cpu-status" class="turn"></p>

      <!-- スコア（単語の文字数の累計） -->
      <div class="scores">
        <div class="score you">
          <span class="score-name">あなた</span>
          <span id="cpu-score-you" class="score-pts">0点</span>
        </div>
        <div class="score">
          <span class="score-name">CPU</span>
          <span id="cpu-score-cpu" class="score-pts">0点</span>
        </div>
      </div>

      <div class="current">
        <p class="label">今の単語</p>
        <p id="current-word" class="word">―</p>
      </div>

      <form id="word-form" autocomplete="off">
        <input id="word-input" type="text" placeholder="ひらがなで入力" />
        <button type="submit">送信</button>
      </form>

      <p id="message" class="message"></p>

      <div class="history">
        <p class="label">これまでの単語</p>
        <ol id="history"></ol>
      </div>

      <button id="reset-btn" type="button">リセット</button>
    </section>

    <!-- 対戦 -->
    <section id="multi" class="panel hidden">
      <!-- セットアップ -->
      <div id="multi-setup">
        <input id="multi-name" type="text" placeholder="名前を入力" maxlength="12" />

        <button type="button" id="quick-btn" class="primary-btn">さっと対戦（ランダム）</button>
        <p class="note">制限時間30秒・先手はランダムです</p>

        <p class="divider">または 合言葉で友達と対戦</p>

        <input id="custom-code" type="text" placeholder="合言葉（任意・空欄でランダム）" maxlength="12" />

        <!-- 部屋の設定（部屋を作る人が決められる） -->
        <div class="room-settings">
          <p class="label">部屋の設定</p>
          <div class="setting-row">
            <label for="setting-time">制限時間</label>
            <select id="setting-time">
              <option value="0">なし</option>
              <option value="10">10秒</option>
              <option value="20">20秒</option>
              <option value="30" selected>30秒</option>
              <option value="60">60秒</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="setting-first">先手</label>
            <select id="setting-first">
              <option value="random" selected>ランダム</option>
              <option value="host">自分</option>
              <option value="guest">相手</option>
            </select>
          </div>
          <div class="setting-row">
            <label for="setting-dict">辞書判定</label>
            <select id="setting-dict">
              <option value="on" selected>あり（実在する単語のみ）</option>
              <option value="off">なし（なんでもOK）</option>
            </select>
          </div>
        </div>

        <button type="button" id="create-btn" class="sub-btn">部屋を作る</button>

        <form id="join-form" autocomplete="off" class="join-row">
          <input id="room-code" type="text" placeholder="合言葉" maxlength="12" />
          <button type="submit" class="sub-btn">部屋に入る</button>
        </form>

        <p id="setup-message" class="message"></p>
      </div>

      <!-- 待機中 -->
      <div id="multi-waiting" class="hidden">
        <div id="share-box" class="hidden">
          <p class="label">この合言葉を相手に伝えてください</p>
          <p id="room-code-display" class="room-code-display"></p>
          <div class="share-url-row">
            <input id="share-url" type="text" readonly />
            <button type="button" id="copy-btn" class="sub-btn">URLをコピー</button>
          </div>
        </div>
        <p class="waiting">対戦相手を待っています...</p>
      </div>

      <!-- 対戦画面 -->
      <div id="multi-game" class="hidden">
        <p id="multi-settings-info" class="settings-info"></p>
        <p id="multi-turn" class="turn"></p>

        <!-- 制限時間ありの部屋だけ表示 -->
        <div id="timer" class="timer hidden">
          <div class="timer-track"><div id="timer-fill" class="timer-fill"></div></div>
          <span id="timer-text" class="timer-text"></span>
        </div>

        <!-- スコア（単語の文字数の累計） -->
        <div class="scores">
          <div class="score you">
            <span id="multi-score-name-you" class="score-name">あなた</span>
            <span id="multi-score-you" class="score-pts">0点</span>
          </div>
          <div class="score">
            <span id="multi-score-name-opp" class="score-name">相手</span>
            <span id="multi-score-opp" class="score-pts">0点</span>
          </div>
        </div>

        <div class="current">
          <p class="label">今の単語</p>
          <p id="multi-current-word" class="word">―</p>
        </div>

        <form id="multi-form" autocomplete="off">
          <input id="multi-input" type="text" placeholder="ひらがなで入力" />
          <button type="submit">送信</button>
        </form>

        <p id="multi-message" class="message"></p>

        <div class="history">
          <p class="label">これまでの単語</p>
          <ol id="multi-history"></ol>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
